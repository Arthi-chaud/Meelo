name: "iOS Build"
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  release:
    types: [published]

defaults:
  run:
    working-directory: ./front/apps/mobile

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Build:
    # Only run if manually requested, pushed on main or on release
    runs-on: macos-26
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      # - name: Install the Apple certificate and provisioning profile
      #   env:
      #     BUILD_CERTIFICATE_BASE64: ${{ secrets.APPSTORE_CERTIFICATES_FILE_BASE64 }}
      #     P12_PASSWORD: ${{ secrets.APPSTORE_CERTIFICATES_PASSWORD }}
      #     BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
      #     KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      #   run: |
      #     # create variables
      #     CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
      #     PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
      #     KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
      #
      #     # import certificate and provisioning profile from secrets
      #     echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
      #     echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
      #
      #     # create temporary keychain
      #     security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
      #     security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
      #     security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
      #
      #     # import certificate to keychain
      #     security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
      #     security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
      #     security list-keychain -d user -s $KEYCHAIN_PATH
      #
      #     # apply provisioning profile
      #     mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
      #     cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles
      - name: Import Certs
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPSTORE_CERTIFICATES_FILE_BASE64 }}
          p12-password: ${{ secrets.APPSTORE_CERTIFICATES_PASSWORD }}
      # - name: Download Build Provisioning Profile
      #   id: dl_build_prof
      #   uses: apple-actions/download-provisioning-profiles@v4
      #   with:
      #     bundle-id: "com.arthichaud.meelo"
      #     profile-type: "IOS_APP_DEVELOPMENT"
      #     issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
      #     api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
      #     api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      - name: Download Store Provisioning Profile
        id: dl_store_prof
        uses: apple-actions/download-provisioning-profiles@v4
        with:
          bundle-id: "com.arthichaud.meelo"
          profile-type: "IOS_APP_STORE"
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
      # - run: echo '${{ steps.dl_build_prof.outputs.profiles }}' && exit 1
      - name: Get Tag
        shell: bash
        if: ${{ github.event_name == 'release' }}
        run: echo "EXPO_PUBLIC_BUILD_COMMIT=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
      - name: Get Commit
        shell: bash
        if: ${{ github.event_name != 'release' }}
        run: echo "EXPO_PUBLIC_BUILD_COMMIT=$(git rev-parse --short ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }})" >> $GITHUB_ENV
      - run: echo "APK_NAME=${{ github.event_name == 'pull_request' && 'meelo-preview.apk' || 'meelo.apk' }}" >> $GITHUB_ENV
      - name: Restore Dependencies
        uses: ./.github/actions/cache-front
      - name: Install Dependencies
        run: yarn workspaces focus -A
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Prebuild
        run: |
          yarn run expo prebuild -p ios
          CI=1 yarn run ios --no-bundler
      # NOTE: Caching Pods does not improve compilation time
      - name: Set Version and Build number
        run: |
          cd ios
          xcrun agvtool new-marketing-version "$(echo ${{ github.event_name != 'release' && '$EXPO_PUBLIC_BUILD_COMMIT' || '0.1'  }} | tr -d v)"
          xcrun agvtool new-version "$(date '+%Y%m%d')"
      # - name: Build
      #   run: eas build --local -p ios --profile production --non-interactive --output meelo.ipa
      # - name: Set Export Options
      #   run: |
      #     cat > ios/ExportOptions.plist <<EOF
      #       <?xml version="1.0" encoding="UTF-8"?>
      #       <plist version="1.0">
      #       <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
      #       <dict>
      #         <key>method</key>
      #         <string>app-store-connect</string>
      #         <key>signingStyle</key>
      #         <string>manual</string>
      #         <key>uploadSymbols</key>
      #         <true/>
      #         <key>provisioningProfiles</key>
      #         <dict>
      #             <key>com.arthichaud.meelo</key>
      #             <string>AppStore com.arthichaud.meelo</string>
      #         </dict>
      #       </dict>
      #       </plist>
      #       EOF
      #
      #     sed -i -e 's/PRODUCT_NAME = Meelo;/PRODUCT_NAME = Meelo;\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "AppStore com.arthichaud.meelo";\n\t\t\t\t"PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]" = "AppStore com.arthichaud.meelo";/g' ios/Meelo.xcodeproj/project.pbxproj
      - name: Define Export Options
        run: |
          cd ios
          cat > ExportOptions.plist <<EOF
            <?xml version="1.0" encoding="UTF-8"?>
            <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
            <plist version="1.0">
            <dict>
              <key>method</key>
              <string>app-store</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.arthichaud.meelo</key>
                  <string>Meelo CI</string>
              </dict>
              <key>signingStyle</key>
              <string>manual</string>
              <key>uploadSymbols</key>
              <true/>
            </dict>
            </plist>
            EOF
      - name: Archive
        run: |
          cd ios
          xcodebuild \
            -workspace Meelo.xcworkspace \
            -scheme Meelo \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -archivePath build/Meelo.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="03c3ee95-0dd3-49f2-8d83-8a88e72a28ed" \
            CODE_SIGN_IDENTITY="iPhone Distribution"

      - name: Export IPA
        run: |
          cd ios
          xcodebuild \
            -exportArchive \
            -archivePath build/Meelo.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/Meelo.ipa
